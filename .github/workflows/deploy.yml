name: Community Server CI/CD

on:
  push:
    branches: [ "main" ] # 본인의 기본 브랜치명에 맞게 수정하세요 (master 등)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 저장소 코드 가져오기
        uses: actions/checkout@v3

      - name: 2. JDK 17 세팅
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: 3. Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: 4. 프로젝트 빌드 (테스트 제외)
        run: ./gradlew clean build -x test

      - name: 5. 빌드된 jar 파일을 EC2로 전송 (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # 빌드된 jar 파일을 EC2의 /home/ec2-user/community 폴더로 보냅니다.
          source: "build/libs/*SNAPSHOT.jar"
          target: "/home/ec2-user/community"
          strip_components: 2

      - name: 6. EC2에 접속해서 기존 서버 내리고 새 서버 실행 (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/community
            
            # 1. 포트 8082를 쓰고 있는 기존 커뮤니티 프로세스 찾아서 죽이기 (8080, 8081 보호!)
            CURRENT_PID=$(lsof -ti:8082)
            if [ -z "$CURRENT_PID" ]; then
                echo "현재 8082 포트에서 실행 중인 커뮤니티 서버가 없습니다."
            else
                echo "실행 중인 커뮤니티 서버 종료 (PID: $CURRENT_PID)"
                kill -15 $CURRENT_PID
                sleep 5
            fi
            
            # 2. 전송된 jar 파일 이름 찾기
            JAR_NAME=$(ls -tr *.jar | tail -n 1)
            echo "실행할 JAR 파일명: $JAR_NAME"
            
            # 3. 백그라운드(nohup)로 새 서버 실행 및 로그 남기기
            nohup java -jar \
            -Dspring.profiles.active=prod \
            -DAWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }} \
            -DAWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }} \
            -DDB_USERNAME=${{ secrets.DB_USERNAME }} \
            -DDB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -DADMIN_SECRET_KEY=${{ secrets.ADMIN_SECRET_KEY }} \
            $JAR_NAME > app.log 2>&1 &
          
            echo "🚀 커뮤니티 서버(8082, Prod모드, MySQL 연동) 자동 배포 완료!"