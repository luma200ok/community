server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 💡 로컬호스트 3306 포트의 community 데이터베이스에 연결!
    url: jdbc:mysql://localhost:3306/community?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect

springdoc:
  api-docs:
    enabled: false # 운영 환경에서 Swagger 비활성화
  swagger-ui:
    enabled: false

app:
  cookie:
    secure: true
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS} # 운영 도메인 명시 (예: https://example.com)

discord:
  webhook-url: ${DISCORD_WEBHOOK_URL}
