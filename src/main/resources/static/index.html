<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 커뮤니티</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<h1>📝 우리들의 커뮤니티</h1>

<div id="top-section">
    <div class="section" id="login-section">
        <h3 style="text-align: center;">🔐 로그인</h3>
        <input type="text" id="username" placeholder="아이디">
        <input type="password" id="password" placeholder="비밀번호">
        <button onclick="login()">로그인</button>
        <div class="link-group">
            <span class="link-text" onclick="toggleForm('signup')">회원가입</span> |
            <span class="link-text" onclick="alert('비밀번호 찾기 API는 아직 공사 중입니다! 🛠️')">비밀번호 찾기</span>
        </div>
    </div>

    <div class="section" id="logout-section" style="display: none; background-color: #fff3cd; text-align: center;">
        <p style="font-weight: bold;">✅ 접속 중입니다.</p>
        <button onclick="logout()" style="background-color: #dc3545; width: auto; padding: 5px 15px;">로그아웃</button>
    </div>

    <div class="section" id="signup-section" style="display: none;">
        <h3 style="text-align: center;">📝 회원가입</h3>
        <input type="text" id="reg-username" placeholder="사용할 아이디">
        <input type="password" id="reg-password" placeholder="사용할 비밀번호">
        <input type="email" id="reg-email" placeholder="이메일 (예: test@test.com)">
        <button onclick="signup()" style="background-color: #ff9800;">회원가입 완료</button>
        <div class="link-group">
            이미 계정이 있으신가요? <span class="link-text" onclick="toggleForm('login')">로그인으로 돌아가기</span>
        </div>
    </div>

    <div class="section" id="write-section">
        <h3>✏️ 새 게시글 작성</h3>
        <input type="text" id="title" placeholder="게시글 제목">
        <textarea id="content" rows="4" placeholder="게시글 내용"></textarea>
        <input type="file" id="imageFile" accept="image/*">
        <button onclick="writePost()">게시글 등록하기</button>
    </div>
</div>

<div class="section" id="list-section">
    <h3>📋 게시글 목록</h3>

    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <input type="text" id="search-keyword" placeholder="검색어를 입력하세요 (제목+내용)" style="flex: 1; margin: 0;">
        <button onclick="fetchPosts()" style="width: auto; margin: 0;">검색</button>
        <button onclick="document.getElementById('search-keyword').value=''; fetchPosts();" style="background-color: #6c757d; width: auto; margin: 0;">초기화</button>
    </div>

    <div id="post-list"></div>
</div>

<div class="section" id="detail-section" style="display: none; background-color: white;">
    <button onclick="showList()" style="background-color: #6c757d; width: auto; margin-bottom: 20px;">🔙 목록으로 돌아가기</button>

    <div style="float: right;">
        <button onclick="showEditForm()" style="background-color: #ffc107; color: black; width: auto; padding: 5px 10px; margin-right: 5px;">수정</button>
        <button onclick="deletePost()" style="background-color: #dc3545; width: auto; padding: 5px 10px;">삭제</button>
    </div>

    <h2 id="detail-title">제목</h2>
    <div id="detail-meta" class="post-meta" style="margin-bottom: 20px;">작성자 정보</div>
    <div id="detail-images"></div>
    <p id="detail-content" style="font-size: 1.1em; line-height: 1.6; margin-bottom: 20px;">내용</p>

    <button id="like-btn" onclick="toggleLike()" style="width: auto; padding: 10px 20px; font-size: 1.1em; background-color: #ff4d4d;"></button>

    <hr style="margin: 30px 0;">

    <h3>💬 댓글</h3>
    <div id="comment-list"></div>
    <div style="margin-top: 15px; display: flex; gap: 10px;">
        <input type="text" id="comment-input" placeholder="댓글을 입력하세요" style="flex: 1; margin: 0;">
        <button onclick="writeComment()" style="width: auto; margin: 0;">작성</button>
    </div>
</div>

<div class="section" id="edit-section" style="display: none; background-color: #e9ecef;">
    <h3>🛠️ 게시글 수정</h3>
    <input type="text" id="edit-title" placeholder="게시글 제목">
    <textarea id="edit-content" rows="4" placeholder="게시글 내용"></textarea>
    <input type="file" id="edit-imageFile" accept="image/*">
    <div style="display: flex; gap: 10px;">
        <button onclick="updatePost()">수정 완료</button>
        <button onclick="cancelEdit()" style="background-color: #6c757d;">취소</button>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
