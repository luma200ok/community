<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Toy Community</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
    <h1 onclick="handleLogoClick()" style="user-select: none;">🔥 Toy Community</h1>
    <div class="header-right" id="auth-section">
    </div>
</header>

<main class="main-container">

    <div id="top-section">

        <div class="section form-card" id="login-section" style="display: none;">
            <h3 style="text-align: center;">🔐 로그인</h3>
            <input type="text" id="username" class="input-box" placeholder="아이디">
            <input type="password" id="password" class="input-box" placeholder="비밀번호">
            <button class="btn btn-primary" style="width: 100%;" onclick="login()">로그인</button>
            <div class="link-group">
                <span class="link-text" onclick="toggleForm('signup')">회원가입</span> |
                <span class="link-text" onclick="toggleForm('find-password')">비밀번호 찾기</span>
            </div>
        </div>

        <div class="section form-card" id="signup-section" style="display: none;">
            <h3 style="text-align: center;">📝 회원가입</h3>
            <input type="text" id="reg-username" class="input-box" placeholder="사용할 아이디">
            <input type="password" id="reg-password" class="input-box" placeholder="사용할 비밀번호">
            <input type="email" id="reg-email" class="input-box" placeholder="이메일 (예: test@test.com)">
            <input type="text" id="reg-hint" class="input-box" placeholder="비밀번호 찾기 힌트 (예: 출신 초등학교는?)">
            <button class="btn btn-primary" style="width: 100%; background-color: #ff9800; border-color: #ff9800;"
                    onclick="signup()">회원가입 완료
            </button>
            <div class="link-group">
                이미 계정이 있으신가요? <span class="link-text" onclick="toggleForm('login')">로그인으로 돌아가기</span>
            </div>
        </div>

        <div class="section form-card" id="find-password-section" style="display: none;">
            <h3 style="text-align: center;">🔍 비밀번호 찾기</h3>
            <input type="text" id="find-username" class="input-box" placeholder="아이디를 입력하세요">
            <input type="email" id="find-email" class="input-box" placeholder="가입 시 이메일을 입력하세요">
            <input type="text" id="find-hint" class="input-box" placeholder="힌트 정답을 입력하세요">
            <button class="btn btn-primary" style="width: 100%; margin-bottom: 10px;" onclick="findPassword()">임시 비밀번호 이메일로 받기</button>
            <div class="link-group">
                <span class="link-text" onclick="toggleForm('login')">로그인으로 돌아가기</span>
            </div>
        </div>

        <div class="section form-card" id="mypage-section" style="display: none;">
            <h3 style="text-align: center;">👤 내 정보 (마이페이지)</h3>

            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <p><strong>아이디:</strong> <span id="my-username"></span></p>
                <p><strong>이메일:</strong> <span id="my-email"></span></p>
                <p><strong>등급:</strong> <span id="my-role"></span></p>
                <p><strong>현재 힌트 정답:</strong> <span id="my-hint"></span></p>
            </div>

            <div id="update-form" style="display: none; border-top: 1px solid #eee; pt: 20px; margin-top: 20px;">
                <h4 style="margin-bottom: 15px;">🛠️ 정보 수정</h4>
                <input type="password" id="upd-current-pw" class="input-box" placeholder="현재 비밀번호 (필수)">
                <input type="password" id="upd-new-pw" class="input-box" placeholder="새 비밀번호 (변경 시만 입력)">
                <input type="text" id="upd-new-hint" class="input-box" placeholder="새 힌트 정답 (변경 시만 입력)">
                <button class="btn btn-primary" style="width: 100%; margin-bottom: 10px;" onclick="updateUserInfo()">수정 적용하기</button>
            </div>

            <div style="display: flex; gap: 10px;" id="mypage-btns">
                <button class="btn btn-outline" style="flex: 1;" onclick="showList()">🔙 목록으로</button>
                <button class="btn btn-primary" style="flex: 1; background-color: #ff9800; border-color: #ff9800;" onclick="toggleUpdateForm()">🔐 정보 수정하기</button>
            </div>

            <div style="margin-top: 30px;">
                <h4 style="border-bottom: 2px solid #333; padding-bottom: 10px;">📋 나의 활동 내역</h4>

                <div style="margin-top: 15px;">
                    <h5>✍️ 내가 쓴 게시글</h5>
                    <div id="my-posts-list" style="font-size: 0.9em; color: #555;">조회 중...</div>
                </div>

                <div style="margin-top: 20px;">
                    <h5>💬 내가 쓴 댓글</h5>
                    <div id="my-comments-list" style="font-size: 0.9em; color: #555;">조회 중...</div>
                </div>
                <div style="margin-top: 20px;">
                    <h5>❤️ 좋아요 누른 게시글</h5>
                    <div id="my-liked-list" style="font-size: 0.9em; color: #555;">조회 중...</div>
                </div>
            </div>
        </div>

        <div class="section form-card" id="write-section" style="display: none;">
            <h3>✏️ 새 게시글 작성</h3>
            <input type="text" id="title" class="input-box" placeholder="게시글 제목">
            <textarea id="content" class="input-box" rows="4" placeholder="게시글 내용"></textarea>
            <input type="file" id="imageFile" accept="image/*, application/pdf" multiple style="display: none;" onchange="handleFileSelect(this, 'write-image-preview', 'write-file-count')">
            <label for="imageFile" class="btn btn-outline" style="display: block; text-align: center; margin-bottom: 10px; border: 2px dashed #ccc; cursor: pointer;">
                📸 여기를 눌러 사진 추가하기 (계속 추가 가능!)
            </label>
            <div id="write-file-count" style="font-size: 13px; color: #28a745; text-align: center; margin-bottom: 10px;"></div>
            <div id="write-image-preview" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" style="flex: 1;" onclick="writePost()">게시글 등록하기</button>
                <button class="btn btn-outline" style="flex: 1;" onclick="showList()">취소</button>
            </div>
        </div>
    </div>

    <div id="list-section">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="search-keyword" class="input-box" placeholder="검색어를 입력하세요 (제목+내용)"
                   style="flex: 1; margin: 0;">
            <button class="btn btn-primary" onclick="fetchPosts()">검색</button>
            <button class="btn btn-outline" onclick="document.getElementById('search-keyword').value=''; fetchPosts();">
                초기화
            </button>
        </div>

        <div id="post-list" class="card-container"></div>
    </div>

    <div class="section detail-card" id="detail-section" style="display: none;">
        <button class="btn btn-outline" onclick="showList()" style="margin-bottom: 20px;">🔙 목록으로 돌아가기</button>

        <div style="float: right;">
            <button class="btn" onclick="showEditForm()" style="background-color: #ffc107; color: black;">수정</button>
            <button class="btn" onclick="deletePost()" style="background-color: #dc3545; color: white;">삭제</button>
        </div>

        <h2 id="detail-title" style="margin-top: 0;">제목</h2>
        <div id="detail-meta" class="post-meta" style="margin-bottom: 20px;">작성자 정보</div>
        <div id="detail-images"></div>
        <p id="detail-content"
           style="font-size: 1.1em; line-height: 1.6; margin-bottom: 30px; white-space: pre-wrap;">
            내용</p>

        <div style="text-align: center; margin-bottom: 30px;">
            <button id="like-btn" class="btn" onclick="toggleLike()"
                    style="padding: 10px 20px; font-size: 1.1em; background-color: #ff4d4d; color: white; border-radius: 20px;"></button>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">

        <h3>💬 댓글</h3>
        <div id="comment-list"></div>
        <div style="margin-top: 15px; display: flex; gap: 10px;">
            <input type="text" id="comment-input" class="input-box" placeholder="댓글을 입력하세요" style="flex: 1; margin: 0;">
            <button class="btn btn-primary" onclick="writeComment()">작성</button>
        </div>

        <button class="btn btn-outline" onclick="showList()" style="width: 100%; margin-top: 30px;">🔙 목록으로 돌아가기</button>
    </div>

    <div class="section form-card" id="edit-section" style="display: none;">
        <h3>🛠️ 게시글 수정</h3>
        <input type="text" id="edit-title" class="input-box" placeholder="게시글 제목">
        <textarea id="edit-content" class="input-box" rows="4" placeholder="게시글 내용"></textarea>
        <input type="file" id="edit-imageFile" accept="image/*application/pdf" multiple style="display: none;" onchange="handleFileSelect(this, 'edit-image-preview', 'edit-file-count')">
        <label for="edit-imageFile" class="btn btn-outline" style="display: block; text-align: center; margin-bottom: 10px; border: 2px dashed #ccc; cursor: pointer;">
            📸 여기를 눌러 사진 추가하기 (계속 추가 가능!)
        </label>
        <div id="edit-file-count" style="font-size: 13px; color: #28a745; text-align: center; margin-bottom: 10px;"></div>
        <div id="edit-image-preview" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;"></div>

        <div style="display: flex; gap: 10px;">
            <button class="btn btn-primary" style="flex: 1;" onclick="updatePost()">수정 완료</button>
            <button class="btn btn-outline" style="flex: 1;" onclick="cancelEdit()">취소</button>
        </div>
    </div>

</main>

<script src="/js/app.js"></script>
</body>
</html>
