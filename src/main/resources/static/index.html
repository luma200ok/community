<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Toy Community</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
    <h1 onclick="showList()">🔥 Toy Community</h1>
    <div class="header-right" id="auth-section">
    </div>
</header>

<main class="main-container">

    <div id="top-section">

        <div class="section form-card" id="login-section" style="display: none;">
            <h3 style="text-align: center;">🔐 로그인</h3>
            <input type="text" id="username" class="input-box" placeholder="아이디">
            <input type="password" id="password" class="input-box" placeholder="비밀번호">
            <button class="btn btn-primary" style="width: 100%;" onclick="login()">로그인</button>
            <div class="link-group">
                <span class="link-text" onclick="toggleForm('signup')">회원가입</span> |
                <span class="link-text" onclick="alert('비밀번호 찾기 API는 공사 중입니다! 🛠️')">비밀번호 찾기</span>
            </div>
        </div>

        <div class="section form-card" id="signup-section" style="display: none;">
            <h3 style="text-align: center;">📝 회원가입</h3>
            <input type="text" id="reg-username" class="input-box" placeholder="사용할 아이디">
            <input type="password" id="reg-password" class="input-box" placeholder="사용할 비밀번호">
            <input type="email" id="reg-email" class="input-box" placeholder="이메일 (예: test@test.com)">
            <button class="btn btn-primary" style="width: 100%; background-color: #ff9800; border-color: #ff9800;" onclick="signup()">회원가입 완료</button>
            <div class="link-group">
                이미 계정이 있으신가요? <span class="link-text" onclick="toggleForm('login')">로그인으로 돌아가기</span>
            </div>
        </div>

        <div class="section form-card" id="write-section" style="display: none;">
            <h3>✏️ 새 게시글 작성</h3>
            <input type="text" id="title" class="input-box" placeholder="게시글 제목">
            <textarea id="content" class="input-box" rows="4" placeholder="게시글 내용"></textarea>
            <input type="file" id="imageFile" accept="image/*" style="margin-bottom: 10px;">

            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" style="flex: 1;" onclick="writePost()">게시글 등록하기</button>
                <button class="btn btn-outline" style="flex: 1;" onclick="showList()">취소</button>
            </div>
    </div>

    <div id="list-section">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="search-keyword" class="input-box" placeholder="검색어를 입력하세요 (제목+내용)" style="flex: 1; margin: 0;">
            <button class="btn btn-primary" onclick="fetchPosts()">검색</button>
            <button class="btn btn-outline" onclick="document.getElementById('search-keyword').value=''; fetchPosts();">초기화</button>
        </div>

        <div id="post-list" class="card-container"></div>
    </div>

    <div class="section detail-card" id="detail-section" style="display: none;">
        <button class="btn btn-outline" onclick="showList()" style="margin-bottom: 20px;">🔙 목록으로 돌아가기</button>

        <div style="float: right;">
            <button class="btn" onclick="showEditForm()" style="background-color: #ffc107; color: black;">수정</button>
            <button class="btn" onclick="deletePost()" style="background-color: #dc3545; color: white;">삭제</button>
        </div>

        <h2 id="detail-title" style="margin-top: 0;">제목</h2>
        <div id="detail-meta" class="post-meta" style="margin-bottom: 20px;">작성자 정보</div>
        <div id="detail-images"></div>
        <p id="detail-content" style="font-size: 1.1em; line-height: 1.6; margin-bottom: 20px; padding: 20px; background: #f8f9fa; border-radius: 8px;">내용</p>

        <div style="text-align: center; margin-bottom: 30px;">
            <button id="like-btn" class="btn" onclick="toggleLike()" style="padding: 10px 20px; font-size: 1.1em; background-color: #ff4d4d; color: white; border-radius: 20px;"></button>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">

        <h3>💬 댓글</h3>
        <div id="comment-list"></div>
        <div style="margin-top: 15px; display: flex; gap: 10px;">
            <input type="text" id="comment-input" class="input-box" placeholder="댓글을 입력하세요" style="flex: 1; margin: 0;">
            <button class="btn btn-primary" onclick="writeComment()">작성</button>
        </div>
    </div>

    <div class="section form-card" id="edit-section" style="display: none;">
        <h3>🛠️ 게시글 수정</h3>
        <input type="text" id="edit-title" class="input-box" placeholder="게시글 제목">
        <textarea id="edit-content" class="input-box" rows="4" placeholder="게시글 내용"></textarea>
        <input type="file" id="edit-imageFile" accept="image/*" style="margin-bottom: 10px;">
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-primary" style="flex: 1;" onclick="updatePost()">수정 완료</button>
            <button class="btn btn-outline" style="flex: 1;" onclick="cancelEdit()">취소</button>
        </div>
    </div>

</main>

<script src="/js/app.js"></script>
</body>
</html>
