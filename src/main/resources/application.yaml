spring:
  profiles:
    active: local # 💡 인텔리제이에서 켤 때는 무조건 local로 작동!

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      s3:
        bucket: my-community-image-bucket-123
      region:
        static: ap-northeast-2

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  jpa:
    properties:
      hibernate:
        default_batch_fetch_size: 100 # N+1 방지!

admin:
  secret-key: ${ADMIN_SECRET_KEY:local-secret-key}